<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #e8eaed;
      background: #202124;
    }
    h3 {
      margin: 0 0 12px;
      font-size: 15px;
      font-weight: 500;
    }
    label {
      display: block;
      margin-bottom: 4px;
      color: #9aa0a6;
      font-size: 12px;
    }
    input, select {
      width: 100%;
      padding: 8px;
      margin-bottom: 12px;
      border: 1px solid #5f6368;
      border-radius: 4px;
      background: #303134;
      color: #e8eaed;
      font-size: 13px;
      box-sizing: border-box;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #8ab4f8;
    }
    button {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 4px;
      background: #8ab4f8;
      color: #202124;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    button:hover { background: #aecbfa; }
    .status {
      margin-top: 8px;
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 12px;
      display: none;
    }
    .status.ok { display: block; background: #1e3a2f; color: #81c995; }
    .status.err { display: block; background: #3c1f1e; color: #f28b82; }
  </style>
</head>
<body>
  <h3>Meet Captions Translator</h3>

  <label>OpenRouter API Key</label>
  <input type="password" id="apiKey" placeholder="sk-or-v1-...">

  <label>Модель</label>
  <select id="model">
    <option value="google/gemini-2.5-flash-lite">Gemini 2.5 Flash Lite (быстрая, дешёвая)</option>
    <option value="google/gemini-flash-1.5">Gemini 1.5 Flash</option>
    <option value="anthropic/claude-3-haiku">Claude 3 Haiku</option>
    <option value="meta-llama/llama-3.1-8b-instruct">Llama 3.1 8B</option>
  </select>

  <button id="save">Сохранить</button>
  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
